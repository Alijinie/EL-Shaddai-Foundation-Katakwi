<!DOCTYPE HTML>
<html lang="en">
  <head>
    <title>Support Our Mission - El-Shaddai Orphanage Foundation</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/ma2.css" />
    <style>
      .donation-card {
        background: #ffffff;
        padding: 2.5em;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        margin: 0 auto;
      }
      .amount-presets {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 12px;
        margin-bottom: 1.5em;
      }
      .preset-btn {
        background: #6eb0f1;
        border: 2px solid #eef2f4;
        padding: 0.75em;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
      }
      .preset-btn.active, .preset-btn:hover {
        background: #11143a;
        color: #fff;
        border-color: #11143a;
      }
      .custom-amount-wrapper {
        margin-bottom: 1.5em;
      }
      .form-group {
        margin-bottom: 1.25em;
      }
      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5em;
        color: #333;
      }
      .donation-submit {
        width: 100%;
        text-align: center;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="is-preload">
    <div id="page-wrapper">

      <div id="header">
        <h1><a href="index.html" id="logo">El-Shaddai Orphanage Foundation</a></h1>
        <nav id="nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Core Competencies.html">Strategic Goals</a></li>
            <li><a href="Our Programmes.html">Sponsorship Programs</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li class="current"><a href="donate.html">Donate</a></li>
            <li><a href="contact.html">Get Involved</a></li>
          </ul>
        </nav>
      </div>

      <section class="wrapper style1">
        <div class="container">
          <header class="major" style="text-align: center;">
            <h2>Empower Vulnerable Children in Uganda</h2>
            <p>Your financial support directly funds healthcare, primary education, and clean infrastructure initiatives.</p>
          </header>

          <div class="donation-card">
            <form id="donationForm">
              
              <div class="form-group">
                <label for="currency">Select Currency</label>
                <select id="currency" name="currency">
                  <option value="UGX">UGX (Ugandan Shilling)</option>
                  <option value="USD">USD (United States Dollar)</option>
                </select>
              </div>

              <label style="display:block; font-weight:600; margin-bottom:0.5em;">Choose Amount</label>
              <div class="amount-presets">
                <button type="button" class="preset-btn" data-val="5">5</button>
                <button type="button" class="preset-btn" data-val="100">100</button>
                <button type="button" class="preset-btn" data-val="1000">1000</button>
                <button type="button" class="preset-btn" id="customTrigger">Custom</button>
              </div>

              <div class="form-group custom-amount-wrapper">
                <input type="number" id="amount" name="amount" placeholder="Enter custom amount" required min="1" />
              </div>

              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required />
              </div>

              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required />
              </div>

              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required />
              </div>

              <button type="submit" class="button donation-submit">Proceed to Secure Payment</button>
            </form>
          </div>

        </div>
      </section>

    </div>

    <script>
      const presetBtns = document.querySelectorAll('.preset-btn');
      const amountInput = document.getElementById('amount');

      presetBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          presetBtns.forEach(b => b.classList.remove('active'));
          if(e.target.dataset.val) {
            amountInput.value = e.target.dataset.val;
            e.target.classList.add('active');
          } else {
            amountInput.value = '';
            amountInput.focus();
            e.target.classList.add('active');
          }
        });
      });

      // Handle submission to our secure processing bridge
     // Listen for when the donor clicks the submit button
document.getElementById('donationForm').addEventListener('submit', async (e) => {
    // 1. Prevent the browser from refreshing the page naturally
    e.preventDefault();
    
    // 2. Gather the input values from your HTML text inputs and save them as standard data types
    const donorPayload = {
        amount: parseFloat(document.getElementById('amount').value), // Number data type
        currency: document.getElementById('currency').value,         // String data type
        firstName: document.getElementById('firstName').value,       // String data type
        email: document.getElementById('email').value                // String data type
    };

    console.log("Packaging up data to send to server...", donorPayload);

    try {
        // 3. Trigger your Netlify Serverless Function using fetch!
        // Netlify automatically turns the /netlify/functions/ folder into an accessible URL endpoint
        const response = await fetch('/.netlify/functions/initiate-payment', {
            method: 'POST', // We use POST because we are sending data over, not just reading it
            headers: { 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(donorPayload) // We must turn our object into a clean string for transport
        });

        // 4. Wait for the serverless function to reply back with Pesapal's response object
        const serverResult = await response.json();

        // 5. Use an 'if statement' fundamental to handle success or failure!
        if (serverResult.redirect_url) {
            console.log("Redirect URL received! Redirecting donor to secure iframe wrapper...");
            // Send the donor's browser to the secure Pesapal checkout tab
            window.location.href = serverResult.redirect_url;
        } else {
            // If Pesapal rejected the request (e.g., amount too low or invalid key configuration)
            alert("Gateway Error: " + serverResult.message);
        }

    } catch (error) {
        console.error("Network baseline breakdown:", error);
        alert("Could not connect to the payment processing engine.");
    }
});
    </script>
  </body>
</html>
